<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>brn475.gaoyuan.cool</title>
    <style>
        /* 极简重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 白色背景 */
            background: #ffffff;
            /* flex 完全居中 */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        /* 正方形尺寸调整：比原来更小巧精致 */
        .dark-square {
            /* 原140x140比例 */
            width: 140px;
            height: 140px;
            
            /* 深灰色半透明背景 */
            background-color: rgba(60, 60, 70, 0.65);
            
            /* 无边框 */
            border: none;
            
            /* 圆角正方形感，比例协调 */
            border-radius: 16px;
            
            /* 使用 flex 列布局，垂直水平 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            
            /* 无任何阴影、动画，原生纯粹感 */
            box-shadow: none;
            transition: none;
        }
        
        /* 圆形旋转动画容器 */
        .spinner {
            width: 28px;
            height: 28px;
            /* 圆形边框：半透明白色底 + 纯白顶部，质感清晰 */
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top: 2.5px solid #ffffff;
            border-radius: 50%;
            /* 旋转动画，无限循环，流畅匀速 */
            animation: spin 0.8s linear infinite;
            /* 下方留出适当间距，与文字保持呼吸感 */
            margin-bottom: 12px;
        }
        
        /* 旋转关键帧 */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        /* 加载文字样式 */
        .loading-text {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #ffffff;
            background: transparent;
            line-height: 1.4;
        }
        
        /* 响应式微调：极小屏幕元素 */
        @media (max-width: 480px) {
            .dark-square {
                width: 120px;
                height: 120px;
                border-radius: 14px;
            }
            .spinner {
                width: 24px;
                height: 24px;
                border-width: 2px;
                margin-bottom: 10px;
            }
            .loading-text {
                font-size: 0.75rem;
            }
        }
        
        /* 对于中等尺寸 */
        @media (min-width: 481px) and (max-width: 768px) {
            .dark-square {
                width: 140px;
                height: 140px;
            }
            .spinner {
                width: 28px;
                height: 28px;
            }
        }
        
        /* 对与正方形也保持极小 */
        @media (min-width: 1200px) {
            .dark-square {
                width: 150px;
                height: 150px;
                border-radius: 18px;
            }
            .spinner {
                width: 30px;
                height: 30px;
                border-width: 2.5px;
                margin-bottom: 14px;
            }
            .loading-text {
                font-size: 0.9rem;
            }
        }
        
        /* 维持正方形优点，失视觉焦点 */
        @media (min-width: 1800px) {
            .dark-square {
                width: 160px;
                height: 160px;
                border-radius: 20px;
            }
            .spinner {
                width: 32px;
                height: 32px;
                margin-bottom: 16px;
            }
            .loading-text {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="dark-square">
        <div class="spinner"></div>
        <span class="loading-text">加载中...</span>
    </div>

    <script>
        // 保持原始跳转逻辑：2秒后跳转到指定页面，所有元素、行为完全保留，仅正方形尺寸缩小
        setTimeout(function() {
            window.location.href = "20260323_81ff58.html";
        }, 2000);
    </script>
</body>
</html>
