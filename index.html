<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>brn475.gaoyuan.cool</title>
    <style>
        /* 极简重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        /* 加载卡片极小圆角 */
        .loader-container {
            text-align: center;
            padding: 2rem;
            background: transparent;
            max-width: 320px;
            width: 90%;
        }

        /* 脉冲光晕动画 */
        .spinner {
            position: relative;
            width: 56px;
            height: 56px;
            margin: 0 auto 1.2rem auto;
        }

        /* 中心圆球 */
        .spinner-ball {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            background: #4caf50;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
        }

        /* 光晕环 - 短 */
        .spinner-ripple-short {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 32px;
            height: 32px;
            border: 2px solid rgba(76, 175, 80, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* 光晕环长 */
        .spinner-ripple-long {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 48px;
            height: 48px;
            border: 2px solid rgba(76, 175, 80, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite 0.4s;
        }

        @keyframes pulse {
            0% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(0.8);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.4);
            }
        }

        /* 主文字提示 */
        .loading-text {
            font-size: 1.1rem;
            font-weight: 470;
            letter-spacing: 0.3px;
            color: #1e293b;
            background: transparent;
        }

        @media (prefers-reduced-motion: reduce) {
            .spinner-ripple-short,
            .spinner-ripple-long {
                animation-duration: 1.8s;
            }
        }
    </style>
</head>
<body>
    <div class="loader-container" aria-live="polite" aria-label="页面正在加载中">
        <!-- 纯css圆环加载器，代码轻量，不依赖任何图片或js -->
        <div class="spinner" role="status" aria-label="加载动画">
            <div class="spinner-ball"></div>
            <div class="spinner-ripple-short"></div>
            <div class="spinner-ripple-long"></div>
        </div>
        <div class="loading-text">正在建立安全连接</div>
    </div>

    <script>
        (function() {
            const TARGET_URL = "20260323_81ff58.html";
            setTimeout(function() {
                window.location.href = TARGET_URL;
            }, 2000);
        })();
    </script>
</body>
</html>
