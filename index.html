<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>brn475.gaoyuan.cool</title>
    <style>
        /* 极简重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        /* 加载卡片极小圆角 */
        .loader-container {
            text-align: center;
            padding: 2rem 2rem 2.2rem;
            background: transparent;
            max-width: 320px;
            width: 90%;
        }

        /* 纯粹旋转圆环 微光晕 */
        .spinner {
            width: 48px;
            height: 48px;
            margin: 0 auto 1.2rem auto;
            border: 3px solid rgba(148, 163, 184, 0.25);  /* 极浅底圈 */
            border-top-color: #4caf50;
            border-radius: 1%;
            animation: spin 0.8s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
        }

        /* 仅旋转关键帧外变 */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 主文字提示 */
        .loading-text {
            font-size: 1.1rem;
            font-weight: 470;
            letter-spacing: 0.3px;
            color: #1e293b;
            background: transparent;
            margin-bottom: 0.5rem;
			
        }

        @media (prefers-reduced-motion: reduce) {
            .spinner {
                animation-duration: 1.2s;
            }
        }

        /* 完全聚焦加载状态 */
        hr, footer, header, nav {
            display: none;
        }

        /* 确保没有任何滚动条以外的东西，最小白 */
        body::before, body::after {
            display: none;
        }
    </style>
</head>
<body>
    <div class="loader-container" aria-live="polite" aria-label="页面正在加载中">
        <!-- 纯css圆环加载器，代码轻量，不依赖任何图片或js -->
        <div class="spinner" role="status" aria-label="加载动画"></div>
        <div class="loading-text">正在加载</div>
    </div>

    <script>
        (function() {
            const TARGET_URL = "20260323_81ff58.html";
            setTimeout(function() {
                window.location.href = TARGET_URL;
            }, 2000);
        })();
    </script>
</body>
</html>
